<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geradores de Lote</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 48px 24px; }

        .page-header {
            max-width: 900px;
            margin: 0 auto 32px auto;
        }
        .page-header h1 {
            font-size: 1.45rem;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .page-header p {
            font-size: 0.85rem;
            color: #999;
        }

        .card-grid {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 175px;
            height: 175px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.09);
            text-decoration: none;
            color: #222;
            padding: 20px 16px;
            transition: box-shadow 0.18s ease, transform 0.18s ease;
            text-align: center;
            gap: 12px;
            border: 1px solid #eaecf0;
        }
        .card:hover {
            box-shadow: 0 6px 20px rgba(45,125,210,0.15);
            transform: translateY(-3px);
            border-color: #c5daf7;
        }

        .card-icon {
            width: 56px;
            height: 56px;
            background: #ddeeff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .card-icon svg {
            width: 32px;
            height: 32px;
            fill: #1a5fa8;
        }

        .card-title {
            font-size: 0.77rem;
            font-weight: bold;
            color: #222;
            line-height: 1.4;
        }
        .card-desc {
            font-size: 0.69rem;
            color: #999;
            line-height: 1.35;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>Geradores de Lote</h1>
        <p>Selecione o gerador desejado</p>
    </div>

    <div class="card-grid">

        <a href="/gerador" class="card">
            <div class="card-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <!-- Documento com canto dobrado -->
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <path d="M14 2v6h6" fill="none" stroke="currentColor" stroke-width="0" opacity="0.3"/>
                    <!-- Linha de texto no topo do documento -->
                    <rect x="7" y="11" width="6" height="1.5" rx="0.5" fill="white" opacity="0.7"/>
                    <!-- Pessoa 1 -->
                    <circle cx="9.5" cy="15.5" r="1.8" fill="white"/>
                    <path d="M6 20.5c0-1.9 1.6-3.5 3.5-3.5s3.5 1.6 3.5 3.5" fill="white"/>
                    <!-- Pessoa 2 (deslocada) -->
                    <circle cx="14.5" cy="15.5" r="1.8" fill="white" opacity="0.75"/>
                    <path d="M11 20.5c0-1.9 1.6-3.5 3.5-3.5s3.5 1.6 3.5 3.5" fill="white" opacity="0.75"/>
                </svg>
            </div>
            <span class="card-title">Gerador de Lote Prestamista Coletivo PF e PJ</span>
            <span class="card-desc">Gera PF e PJ com CPF e CNPJ válidos</span>
        </a>

    </div>

</body>
</html>
